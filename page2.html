<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<link href="./css/forPage2.css" rel="stylesheet" type="text/css">
		<script type="text/javascript" src="./js/jquery-3.5.1.js"></script>
		<script type="text/javascript" src="./js/forPage2.js"></script>
		<script type="text/javascript" src="./js/header.js"></script>
	</head>
	<body>
		<main>
			<h3>Top 6 Best Poké Balls</h3>
			<div class="imageContainer">
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_01.png" class="pokeBall" id="pb001"/>
					<h4>Nest ball</h4>
				</div>
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_02.png" class="pokeBall" id="pb002"/>
					<h4>Net ball</h4>
				</div>
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_03.png" class="pokeBall" id="pb003"/>
					<h4>Fast ball</h4>
				</div>
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_04.png" class="pokeBall" id="pb004"/>
					<h4>Heavy ball</h4>
				</div>
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_05.png" class="pokeBall" id="pb005"/>
					<h4>Timer ball</h4>
				</div>
				<div class="poke_ball_container">
					<img src="./images/Poke_ball_06.png" class="pokeBall" id="pb006"/>
					<h4>Friend ball</h4>
				</div>
			</div>
			<h3>Click to Move Phoenix!</h3>
			<div class="imageContainer">
				<img src="./images/Phoenix.gif" class="pokemon" id="pkm_phoenix"/>
			</div>
			<h3>Feed Bulbasaur</h3>
			<input type="button" name="button" id="feed" value="Grow up!" class="button"/>
			<input type="button" name="button" id="starve" value="Smaller!" class="button"/>
			<div class="imageContainer">
				<img src="./images/Bulbasaur.png" class="pokemon" id="pkm_bulbasaur"/>
			</div>
			<h3>Hiding Pikachu</h3>
			<div class="imageContainer">
				<img src="./images/Pikachu.png" class="pokemon" id="pkm_pikachu"/>
			</div>
			<input type="button" name="button" id="hideBtn" value="Hide up!" class="button"/>
			<input type="button" name="button" id="showBtn" value="Show up!" class="button"/>
			<a href="#"><div id="toTop">↑</div></a>
		</main>
		<footer>
			License:<br/>
			<address>Address: Taipei, Taiwan</address>
		</footer>
	</body>
</html>
