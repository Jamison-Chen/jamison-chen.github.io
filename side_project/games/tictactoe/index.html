<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link href="/css/forAll.css" rel="stylesheet" type="text/css">
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <script type="module" src="./modules/script.js" defer></script>
    <title>Tic Tac Toe</title>
</head>

<body id="body">
    <div id="main-board" class="">
        <div id="0,0" class="cell" data-cell></div>
        <div id="1,0" class="cell" data-cell></div>
        <div id="2,0" class="cell" data-cell></div>
        <div id="0,1" class="cell" data-cell></div>
        <div id="1,1" class="cell" data-cell></div>
        <div id="2,1" class="cell" data-cell></div>
        <div id="0,2" class="cell" data-cell></div>
        <div id="1,2" class="cell" data-cell></div>
        <div id="2,2" class="cell" data-cell></div>
    </div>
    <div id="control-bar">
        <button class="control-btn" id="multiplayer-btn">Multiplayers</button>
        <button class="control-btn" id="naive-machine-btn">Naive Computer</button>
        <button class="control-btn" id="trained-machine-btn">Trained Computer</button>
        <button class="control-btn" id="reload-btn">Restart</button>
    </div>
    <div class="back-bar">
        <a href="../" class="dropdown-item px-0 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
            </svg>
        </a>
        <a href="/" class="dropdown-item px-0 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-house-door-fill" viewBox="0 0 16 16">
                <path d="M6.5 10.995V14.5a.5.5 0 0 1-.5.5H2a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .146-.354l6-6a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 .146.354v7a.5.5 0 0 1-.5.5h-4a.5.5 0 0 1-.5-.5V11c0-.25-.25-.5-.5-.5H7c-.25 0-.5.25-.5.495z"/>
                <path fill-rule="evenodd" d="M13 2.5V6l-2-2V2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5z"/>
            </svg>
        </a>
    </div>
    <div id="winning-message" class="">
        <div data-winning-message-text></div>
        <button id="restart-btn">RESTART</button>
    </div>
</body>

</html>
