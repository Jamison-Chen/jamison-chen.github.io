<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/forAll.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="./modules/script.js" defer></script>
    <title>Demand/Supply Simulator</title>
</head>

<body>
    <div id="animation-field"></div>
    <div id="right-side">
        <div id="market-eq-chart"></div>
        <div class=tab-container>
            <div class="tabs clearfix">
                <div id="surplus-tab" class="tab active">Surplus</div>
                <div id="curve-tab" class="tab">Curve</div>
            </div>
        </div>
        <div id="surplus-chart" class="info-chart active"></div>
        <div id="demand-supply-chart" class="info-chart"></div>
        <div id="control-bar">
            <div id="parameter-field">
                <div>
                    <div>Initial Equilibrium</div>
                    <input id="initial-eq" type="text">
                </div>
                <div>
                    <div>Number of Consumer</div>
                    <input id="number-of-consumer" type="text">
                </div>
                <div>
                    <div>Number of Supplier</div>
                    <input id="number-of-supplier" type="text">
                </div>
                <div>
                    <div>Day to Simulate</div>
                    <input id="day-to-simulate" type="text">
                </div>
                <div>
                    <div>Pause Time (ms)</div>
                    <input id="pause-time" type="text">
                </div>
            </div>
            <div id="btn-field">
                <button id="start-btn">RUN</button>
                <button id="reset-btn">RESET</button>
                <div id="back-bar">
                    <a href="../" id="back-to-home">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#888" class="bi bi-chevron-left" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
                        </svg>
                    </a>
                    <a href="/" id="back-to-index">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#888" class="bi bi-house-door-fill" viewBox="0 0 16 16">
                            <path d="M6.5 10.995V14.5a.5.5 0 0 1-.5.5H2a.5.5 0 0 1-.5-.5v-7a.5.5 0 0 1 .146-.354l6-6a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 .146.354v7a.5.5 0 0 1-.5.5h-4a.5.5 0 0 1-.5-.5V11c0-.25-.25-.5-.5-.5H7c-.25 0-.5.25-.5.495z"/>
                            <path fill-rule="evenodd" d="M13 2.5V6l-2-2V2.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 .5.5z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
