<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<link href="./css/forPage1.css" rel="stylesheet" type="text/css">
		<script type="text/javascript" src="./js/jquery-3.5.1.js"></script>
		<script type="text/javascript" src="./js/forPage1.js"></script>
		<script type="text/javascript" src="./js/header.js"></script>
	</head>
	<body>
		<main>
			<h3>Moving Squares</h3>
			<div style="height:500px">
				<div class="squareContainer">
					<div id="sq001" class="autoSquare"></div>
				</div>
				<div class="squareContainer">
					<div id="sq002" class="autoSquare"></div>
				</div>
				<div class="squareContainer">
					<div id="sq003" class="autoSquare"></div>
				</div>
			</div>
			<h3>Touch Square</h3>
			<div id="bar001" class="playSquare"></div>
			<div id="bar002" class="playSquare"></div>
			<div id="bar003" class="playSquare"></div>
			<div id="bar004" class="playSquare"></div>
			<div id="bar005" class="playSquare"></div>
			<h3>canvas</h3>
			<canvas id="canvas001" width="1440" height="300" style="border:1px solid #000000"></canvas>
			<script type="text/javascript">
				var canvas001 = document.getElementById("canvas001").getContext("2d");
				canvas001.fillStyle="#D4CDB0";
				canvas001.fillRect(100, 100, 100, 100);
			</script>
			<h3>Keynes</h3>
			<canvas id="canvas002" width="1920" height="1080" style="border:1px solid #000000;width:50%"></canvas>
			<script type="text/javascript">
				var canvas002 = document.getElementById("canvas002").getContext("2d");
				var Keynes = new Image();
				Keynes.src = "./images/Keynes.jpg";
				canvas002.drawImage(keynes, 0, 0, 192, 108);
			</script>
			<a href="#"><div id="toTop">↑</div></a>
		</main>
		<footer>
			License:<br/>
			<address>Address: Taipei, Taiwan</address>
		</footer>
	</body>
</html>
